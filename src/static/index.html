<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="auth-container">
        <h3>Login</h3>
        <form id="auth-form">
          <div class="form-group">
            <label for="auth-email">Email:</label>
            <input type="email" id="auth-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="auth-password">Password:</label>
            <input type="password" id="auth-password" required placeholder="student123" />
          </div>
          <button type="submit">Login</button>
          <button type="button" id="logout-btn" class="hidden">Logout</button>
        </form>
        <p class="helper-text">Demo: participants use password <strong>student123</strong>. Admin: <strong>admin@mergington.edu / admin123</strong>.</p>
        <div id="auth-status" class="info hidden"></div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="signup-user" class="helper-text">Please login to sign up.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
